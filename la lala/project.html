<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yayyyy!! 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --pink: #ff85a1; --deep: #c9446a;
    --soft: #fff0f5; --peach: #ffb3c6; --cream: #fff8fb;
  }
  body {
    min-height: 100vh; background: var(--cream);
    font-family: 'Nunito', sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; overflow-x: hidden;
  }
  .hearts-bg { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .heart-float {
    position: absolute; bottom: -60px; opacity: 0;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(-10deg); opacity: 0; }
    10%  { opacity: 0.8; } 90% { opacity: 0.5; }
    100% { transform: translateY(-110vh) rotate(20deg); opacity: 0; }
  }

  .card {
    position: relative; z-index: 1; background: white;
    border-radius: 32px; padding: 48px 38px 42px;
    max-width: 500px; width: 100%;
    box-shadow: 0 8px 40px rgba(255,133,161,0.25), 0 2px 12px rgba(255,133,161,0.12);
    text-align: center;
    animation: popIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes popIn {
    from { opacity:0; transform: scale(0.6) translateY(50px); }
    to   { opacity:1; transform: scale(1) translateY(0); }
  }

  .big-emoji {
    font-size: 80px; display: block; margin-bottom: 12px;
    animation: bigBounce 1.5s ease-in-out infinite;
  }
  @keyframes bigBounce {
    0%,100% { transform: translateY(0) rotate(-5deg) scale(1); }
    50%      { transform: translateY(-16px) rotate(5deg) scale(1.08); }
  }

  h1 {
    font-family: 'Pacifico', cursive; color: var(--deep);
    font-size: 2rem; margin-bottom: 8px;
    animation: fadeUp 0.6s 0.3s both;
  }
  .tag {
    color: var(--pink); font-size: 0.88rem; font-weight: 700;
    letter-spacing: 0.08em; margin-bottom: 30px;
    animation: fadeUp 0.6s 0.5s both;
  }

  .main-msg {
    background: linear-gradient(135deg, #fff0f5, #ffe4ef);
    border-radius: 22px; padding: 26px 24px;
    margin-bottom: 26px; border: 2px solid var(--peach);
    animation: fadeUp 0.7s 0.7s both;
  }
  .main-msg p {
    font-size: 1.18rem; color: var(--deep);
    font-weight: 800; line-height: 1.7;
  }
  .main-msg .emoji-row {
    font-size: 28px; letter-spacing: 6px;
    margin-top: 14px; display: block;
  }

  .flowers {
    font-size: 26px; letter-spacing: 5px; margin-bottom: 26px;
    animation: fadeUp 0.6s 1.1s both;
  }

  .sparkle-btn {
    background: linear-gradient(135deg, var(--pink), var(--deep));
    color: white; font-family: 'Pacifico', cursive;
    font-size: 1.05rem; border: none; border-radius: 50px;
    padding: 16px 42px; cursor: pointer;
    box-shadow: 0 6px 28px rgba(201,68,106,0.32);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.6s 1.3s both;
  }
  .sparkle-btn:hover { transform: scale(1.07) translateY(-2px); box-shadow: 0 12px 36px rgba(201,68,106,0.42); }
  .sparkle-btn:active { transform: scale(0.96); }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(18px); }
    to   { opacity:1; transform: translateY(0); }
  }

  /* Confetti */
  .confetti-piece {
    position: fixed; pointer-events: none; z-index: 9999;
    border-radius: 2px; opacity: 0;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0%   { opacity: 1; transform: translateY(-10px) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(100vh) rotate(800deg) scale(0.5); }
  }

  /* Rainbow shimmer on text */
  .shimmer {
    background: linear-gradient(90deg, var(--deep), var(--pink), #ffb347, var(--pink), var(--deep));
    background-size: 300% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer {
    from { background-position: 0% center; }
    to   { background-position: 300% center; }
  }
</style>
</head>
<body>
<div class="hearts-bg" id="heartsBg"></div>

<div class="card">
  <span class="big-emoji">🥳</span>
  <h1 class="shimmer">Yayyyy Cutuuuuu !!</h1>

  <div class="main-msg">
    <p>
      Thank youuu cutuuu for accepting my apology and let's be more than just friends... 😭
    </p>
  </div>

  <div class="flowers">Hehehehehe</div>

  <button class="sparkle-btn" onclick="celebrate()">
    Cutyyyyyy
  </button>

</div>

<script>
  
  const emojis = ["💕","💗","🌸","💖","🌷","✨","🫶","🥺","💝","🎀","💞","🌼"];
  const bg = document.getElementById("heartsBg");
  for (let i = 0; i < 26; i++) {
    const h = document.createElement("div");
    h.className = "heart-float";
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (14 + Math.random() * 22) + "px";
    h.style.animationDuration = (5 + Math.random() * 7) + "s";
    h.style.animationDelay = (Math.random() * 6) + "s";
    bg.appendChild(h);
  }

  // Auto-celebrate on load
  window.addEventListener("load", () => {
    setTimeout(celebrate, 800);
    setTimeout(celebrate, 2000);
  });

  function celebrate() {
    const colors = ["#ff85a1","#ffb3c6","#c9446a","#ffd6e7","#ff6b9d","#fff","#ffb347","#ffd700","#a0e7ff"];
    const emojiList = ["💕","🌸","💖","✨","🎉","💗","🌷","🫶"];
    for (let i = 0; i < 80; i++) {
      setTimeout(() => {
        const c = document.createElement("div");
        c.className = "confetti-piece";
        const useEmoji = Math.random() > 0.55;
        if (useEmoji) {
          c.textContent = emojiList[Math.floor(Math.random() * emojiList.length)];
          c.style.fontSize = (14 + Math.random() * 16) + "px";
          c.style.background = "transparent";
        } else {
          const size = 6 + Math.random() * 10;
          c.style.width = size + "px";
          c.style.height = size + "px";
          c.style.background = colors[Math.floor(Math.random() * colors.length)];
          c.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
        }
        c.style.left = (5 + Math.random() * 90) + "vw";
        c.style.top = "-20px";
        c.style.animationDuration = (1.2 + Math.random() * 1.5) + "s";
        c.style.animationDelay = (Math.random() * 0.4) + "s";
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3000);
      }, i * 18);
    }
  }
</script>
</body>
</html>
